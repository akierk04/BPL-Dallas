<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BPL Dallas – Live Board</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .board-header {
      text-align: center;
      padding: 24px 20px 8px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .board-title {
      font-family: var(--font-display);
      font-size: 2.2rem;
      letter-spacing: 0.1em;
      color: var(--accent);
    }
    .board-sub {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-top: 4px;
    }
    .live-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      margin-right: 6px;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .board-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
      margin-bottom: 32px;
    }
    .board-captain-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .board-captain-header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .board-captain-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }
    .board-purse-wrap {
      text-align: right;
    }
    .board-purse {
      font-family: var(--font-display);
      font-size: 1.3rem;
      color: var(--accent);
      letter-spacing: 0.04em;
      line-height: 1;
    }
    .board-purse-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .board-roster {
      padding: 10px 16px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .board-player-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
      padding: 5px 0;
      border-bottom: 0.5px solid var(--border);
    }
    .board-player-row:last-child { border-bottom: none; }
    .board-player-name { color: var(--text); }
    .board-player-price { color: var(--accent); font-weight: 500; font-size: 12px; }
    .board-empty { color: var(--muted); font-size: 12px; font-style: italic; padding: 8px 0; text-align: center; }

    /* Player pool section */
    .pool-filters {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--muted);
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 500;
      padding: 5px 14px;
      cursor: pointer;
      width: auto;
      letter-spacing: 0;
      transition: all 0.15s;
    }
    .filter-btn.active, .filter-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(240,192,64,0.07);
    }
    .pool-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 8px;
    }
    .pool-player-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      transition: border-color 0.15s;
    }
    .pool-player-card.is-sold {
      border-color: rgba(62,207,142,0.3);
      background: rgba(62,207,142,0.04);
    }
    .pool-player-card-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 4px;
    }
    .pool-player-card-meta {
      font-size: 11px;
      color: var(--muted);
    }
    .pool-player-card-sold {
      font-size: 11px;
      color: var(--green);
      font-weight: 500;
      margin-top: 4px;
    }
    .stats-bar {
      display: flex;
      gap: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .stat-item { display: flex; flex-direction: column; }
    .stat-val { font-family: var(--font-display); font-size: 1.5rem; color: var(--accent); letter-spacing: 0.04em; line-height: 1; }
    .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }
    .stat-div { width: 1px; background: var(--border); margin: 0 4px; }

    @media (max-width: 480px) {
      .board-grid { grid-template-columns: 1fr; }
      .pool-grid { grid-template-columns: repeat(2, 1fr); }
      .board-title { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
  <div class="board-header">
    <div class="board-title">Brownish Premier League</div>
    <div class="board-sub"><span class="live-dot"></span>Live · Season 1 · Dallas</div>
  </div>

  <div class="page">
    <!-- Stats bar -->
    <div class="stats-bar" id="statsBar">
      <div class="stat-item"><div class="stat-val" id="statSold">—</div><div class="stat-label">Players Sold</div></div>
      <div class="stat-div"></div>
      <div class="stat-item"><div class="stat-val" id="statAvail">—</div><div class="stat-label">Available</div></div>
      <div class="stat-div"></div>
      <div class="stat-item"><div class="stat-val" id="statSpent">—</div><div class="stat-label">Total Pts Spent</div></div>
    </div>

    <!-- Captains -->
    <div class="section-title">Captains & Teams</div>
    <div class="board-grid" id="boardCaptains"></div>

    <!-- Player Pool -->
    <div class="section-title" style="margin-top:8px;">Player Pool</div>
    <div class="pool-filters">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('available', this)">Available</button>
      <button class="filter-btn" onclick="setFilter('sold', this)">Sold</button>
      <button class="filter-btn" onclick="setFilter('A', this)">Group A</button>
      <button class="filter-btn" onclick="setFilter('B', this)">Group B</button>
      <button class="filter-btn" onclick="setFilter('C', this)">Group C</button>
    </div>
    <div class="pool-grid" id="boardPool"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script>
    let allCaptains = [], allPlayers = [], currentFilter = 'all';

    function setFilter(f, btn) {
      currentFilter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderPool();
    }

    async function loadData() {
      const [capRes, playRes] = await Promise.all([
        supabase.from('captains').select('*').order('group_name').order('name'),
        supabase.from('players').select('*').order('group_name').order('name')
      ]);
      allCaptains = capRes.data || [];
      allPlayers  = playRes.data || [];
      renderStats();
      renderCaptains();
      renderPool();
    }

    function renderStats() {
      const sold  = allPlayers.filter(p => p.is_sold);
      const avail = allPlayers.filter(p => !p.is_sold);
      const spent = sold.reduce((s,p) => s+(p.sold_price||0), 0);
      document.getElementById('statSold').textContent  = sold.length;
      document.getElementById('statAvail').textContent = avail.length;
      document.getElementById('statSpent').textContent = spent.toLocaleString();
    }

    function renderCaptains() {
      const grid = document.getElementById('boardCaptains');
      if (!allCaptains.length) { grid.innerHTML = '<div class="text-muted">Loading...</div>'; return; }
      grid.innerHTML = allCaptains.map(c => {
        const roster = allPlayers.filter(p => p.captain_id === c.id);
        const rHtml  = roster.length
          ? roster.map(p => `
              <div class="board-player-row">
                <span class="board-player-name">${p.name}
                  <span class="group-badge group-${p.group_name}" style="font-size:9px;padding:2px 5px;">Grp ${p.group_name}</span>
                </span>
                <span class="board-player-price">${p.sold_price} pts</span>
              </div>`).join('')
          : '<div class="board-empty">No players yet</div>';
        return `
          <div class="board-captain-card">
            <div class="board-captain-header">
              <div>
                <div class="board-captain-name">${c.name}</div>
                <span class="group-badge group-${c.group_name}" style="margin-top:4px;display:inline-block;">Group ${c.group_name}</span>
              </div>
              <div class="board-purse-wrap">
                <div class="board-purse-label">Purse</div>
                <div class="board-purse">${c.wallet.toLocaleString()}</div>
                <div class="board-purse-label">pts left</div>
              </div>
            </div>
            <div class="board-roster">${rHtml}</div>
          </div>`;
      }).join('');
    }

    function renderPool() {
      const grid = document.getElementById('boardPool');
      let filtered = allPlayers;
      if (currentFilter === 'available') filtered = allPlayers.filter(p => !p.is_sold);
      else if (currentFilter === 'sold')  filtered = allPlayers.filter(p => p.is_sold);
      else if (['A','B','C'].includes(currentFilter)) filtered = allPlayers.filter(p => p.group_name === currentFilter);

      if (!filtered.length) { grid.innerHTML = '<div class="text-muted">No players match this filter.</div>'; return; }
      grid.innerHTML = filtered.map(p => {
        const cap = allCaptains.find(c => c.id === p.captain_id);
        return `
          <div class="pool-player-card ${p.is_sold ? 'is-sold' : ''}">
            <div class="pool-player-card-name">${p.name}</div>
            <div class="pool-player-card-meta">
              <span class="group-badge group-${p.group_name}" style="font-size:9px;padding:2px 6px;">Grp ${p.group_name}</span>
              &nbsp;${p.base_price} pts base
            </div>
            ${p.is_sold
              ? `<div class="pool-player-card-sold">✓ ${cap ? cap.name : '?'} · ${p.sold_price} pts</div>`
              : `<div style="font-size:11px;color:var(--muted);margin-top:4px;">Available</div>`}
          </div>`;
      }).join('');
    }

    // Realtime
    supabase.channel('bpl-board')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'captains' }, loadData)
      .on('postgres_changes', { event: '*', schema: 'public', table: 'players' }, loadData)
      .subscribe();

    loadData();
  </script>
</body>
</html>
