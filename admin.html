<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BPL Dallas – Admin</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="nav">
    <span class="nav-brand" style="font-size:1.1rem;letter-spacing:0.06em;">Brownish Premier League <span style="font-size:0.9rem;color:var(--muted);font-family:var(--font-body);letter-spacing:0">· Admin</span></span>
    <div class="nav-user">
      <button class="btn-logout" onclick="logout()">Sign out</button>
    </div>
  </nav>

  <div class="page">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('overview')">Overview</button>
      <button class="tab" onclick="switchTab('players')">Players</button>
      <button class="tab" onclick="switchTab('console')">Core Console</button>
    </div>

    <!-- Overview -->
    <div id="tab-overview">
      <div class="section-title">Captains & Purses</div>
      <div id="overviewMsg" class="text-muted" style="margin-bottom:12px;"></div>
      <div class="captains-grid" id="adminCaptainsGrid"></div>
    </div>

    <!-- Players -->
    <div id="tab-players" style="display:none;">
      <div class="section-title">Add Player</div>
      <div class="form-card">
        <div class="form-row">
          <input type="text" id="playerName" placeholder="Player name" />
          <select id="playerGroup">
            <option value="A">Group A (200 pts base)</option>
            <option value="B">Group B (100 pts base)</option>
            <option value="C">Group C (50 pts base)</option>
          </select>
          <button class="btn-primary" onclick="addPlayer()">Add</button>
        </div>
        <p id="playerMsg" class="text-muted mt-8"></p>
      </div>
      <div class="section-title">
        Player Pool
        <span id="playerCount" style="font-size:0.85rem;color:var(--muted);font-family:var(--font-body);font-weight:400;letter-spacing:0;margin-left:8px;"></span>
      </div>
      <div id="playersList" class="players-list"></div>
    </div>

    <!-- Core Console -->
    <div id="tab-console" style="display:none;">
      <div class="section-title">Assign Player</div>
      <div class="form-card">
        <div class="form-row">
          <select id="consolePlayer" style="flex:2;">
            <option value="">Select player...</option>
          </select>
          <select id="consoleCaptain" style="flex:2;">
            <option value="">Select captain...</option>
          </select>
          <input type="number" id="consolePrice" placeholder="Sold price (pts)" min="0" style="flex:1;min-width:120px;" />
          <button class="btn-primary" onclick="doAssign()">Assign</button>
        </div>
        <p id="consoleMsg" class="text-muted mt-8"></p>
      </div>
      <div class="section-title">Assigned Players</div>
      <div id="assignedList" class="players-list"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script>
    if (sessionStorage.getItem('bpl_role') !== 'admin') window.location.href = 'index.html';
    function logout() { sessionStorage.clear(); window.location.href = 'index.html'; }

    let allCaptains = [], allPlayers = [];
    const TABS = ['overview','players','console'];

    function switchTab(tab) {
      TABS.forEach(t => document.getElementById('tab-'+t).style.display = t === tab ? 'block' : 'none');
      document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active', TABS[i] === tab));
    }

    async function loadData() {
      const [capRes, playRes] = await Promise.all([
        supabase.from('captains').select('*').order('group_name').order('name'),
        supabase.from('players').select('*').order('group_name').order('name')
      ]);
      if (capRes.error) { document.getElementById('overviewMsg').textContent = 'DB error: ' + capRes.error.message; return; }
      allCaptains = capRes.data || [];
      allPlayers  = playRes.data || [];
      renderOverview();
      renderPlayersList();
      renderAssignedList();
      populateConsoleDropdowns();
    }

    function renderOverview() {
      const grid = document.getElementById('adminCaptainsGrid');
      if (!allCaptains.length) { grid.innerHTML = '<div class="text-muted">No captains found.</div>'; return; }
      grid.innerHTML = allCaptains.map(c => {
        const roster = allPlayers.filter(p => p.captain_id === c.id);
        const spent  = roster.reduce((s,p) => s+(p.sold_price||0), 0);
        const rHtml  = roster.length
          ? roster.map(p => `
              <div class="roster-player">
                <span class="roster-player-name">${p.name} <span class="group-badge group-${p.group_name}" style="font-size:9px;padding:2px 5px;">Grp ${p.group_name}</span></span>
                <div style="display:flex;align-items:center;gap:6px;">
                  <span class="roster-player-price">${p.sold_price} pts</span>
                  <button class="btn-danger" onclick="unassignPlayer('${p.id}','${c.id}',${p.sold_price})">✕</button>
                </div>
              </div>`).join('')
          : '<div class="roster-empty">No players yet</div>';
        return `
          <div class="captain-card">
            <div class="captain-card-header">
              <div style="width:100%;">
                <div style="display:flex;align-items:center;justify-content:space-between;">
                  <div class="captain-name">${c.name}</div>
                  <span class="group-badge group-${c.group_name}">Group ${c.group_name}</span>
                </div>
                <div style="display:flex;gap:20px;margin-top:8px;">
                  <div><div class="captain-wallet-label">Purse left</div>
                    <div class="captain-wallet">${c.wallet.toLocaleString()} <span style="font-size:0.75rem;color:var(--muted)">pts</span></div></div>
                  <div><div class="captain-wallet-label">Spent</div>
                    <div class="captain-wallet" style="color:var(--muted)">${spent.toLocaleString()} <span style="font-size:0.75rem;">pts</span></div></div>
                </div>
              </div>
            </div>
            <div class="team-roster">${rHtml}</div>
          </div>`;
      }).join('');
    }

    function renderPlayersList() {
      const list  = document.getElementById('playersList');
      const count = document.getElementById('playerCount');
      const avail = allPlayers.filter(p => !p.is_sold).length;
      count.textContent = `(${avail} available · ${allPlayers.length - avail} sold · ${allPlayers.length} total)`;
      if (!allPlayers.length) { list.innerHTML = '<div class="text-muted">No players in pool yet.</div>'; return; }
      list.innerHTML = allPlayers.map(p => {
        const cap = allCaptains.find(c => c.id === p.captain_id);
        return `
          <div class="player-row">
            <span class="player-row-name">${p.name}</span>
            <span class="group-badge group-${p.group_name}">Group ${p.group_name}</span>
            <span class="player-row-meta">${p.base_price} pts base</span>
            ${p.is_sold
              ? `<span class="sold-badge">Sold → ${cap ? cap.name : '?'} · ${p.sold_price} pts</span>`
              : `<span class="unsold-badge">Available</span>`}
            <div class="player-row-actions">
              ${!p.is_sold ? `<button class="btn-sm" onclick="quickAssign('${p.id}')">Assign →</button>` : ''}
              <button class="btn-danger" onclick="deletePlayer('${p.id}')">Delete</button>
            </div>
          </div>`;
      }).join('');
    }

    function renderAssignedList() {
      const list = document.getElementById('assignedList');
      const sold = allPlayers.filter(p => p.is_sold);
      if (!sold.length) { list.innerHTML = '<div class="text-muted">No players assigned yet.</div>'; return; }
      list.innerHTML = sold.map(p => {
        const cap = allCaptains.find(c => c.id === p.captain_id);
        return `
          <div class="player-row">
            <span class="player-row-name">${p.name}</span>
            <span class="group-badge group-${p.group_name}">Group ${p.group_name}</span>
            <span class="player-row-meta">→ ${cap ? cap.name : '?'}</span>
            <span class="sold-badge">${p.sold_price} pts</span>
            <div class="player-row-actions">
              <button class="btn-danger" onclick="unassignPlayer('${p.id}','${p.captain_id}',${p.sold_price})">Unassign</button>
            </div>
          </div>`;
      }).join('');
    }

    async function addPlayer() {
      const name  = document.getElementById('playerName').value.trim();
      const group = document.getElementById('playerGroup').value;
      const msg   = document.getElementById('playerMsg');
      if (!name) { msg.textContent = 'Enter a player name.'; return; }
      const basePrice = group === 'A' ? 200 : group === 'B' ? 100 : 50;
      const { error } = await supabase.from('players').insert({ name, group_name: group, base_price: basePrice });
      if (error) { msg.textContent = 'Error: ' + error.message; return; }
      document.getElementById('playerName').value = '';
      msg.textContent = `${name} added to Group ${group}.`;
      setTimeout(() => msg.textContent = '', 3000);
      loadData();
    }

    async function deletePlayer(id) {
      if (!confirm('Delete this player?')) return;
      await supabase.from('players').delete().eq('id', id);
      loadData();
    }

    function populateConsoleDropdowns() {
      const pSel  = document.getElementById('consolePlayer');
      const cSel  = document.getElementById('consoleCaptain');
      const cur_p = pSel.value, cur_c = cSel.value;
      const avail = allPlayers.filter(p => !p.is_sold);
      pSel.innerHTML = '<option value="">Select player...</option>' +
        avail.map(p => `<option value="${p.id}" ${p.id===cur_p?'selected':''}}>${p.name} · Group ${p.group_name} (base ${p.base_price})</option>`).join('');
      cSel.innerHTML = '<option value="">Select captain...</option>' +
        allCaptains.map(c => `<option value="${c.id}" ${c.id===cur_c?'selected':''}>${c.name} · ${c.wallet.toLocaleString()} pts left</option>`).join('');
    }

    function quickAssign(playerId) {
      switchTab('console');
      setTimeout(() => { document.getElementById('consolePlayer').value = playerId; }, 50);
    }

    async function doAssign() {
      const playerId  = document.getElementById('consolePlayer').value;
      const captainId = document.getElementById('consoleCaptain').value;
      const price     = parseInt(document.getElementById('consolePrice').value);
      const msg       = document.getElementById('consoleMsg');
      if (!playerId || !captainId || isNaN(price) || price < 0) { msg.textContent = 'Fill all fields.'; return; }
      const captain = allCaptains.find(c => c.id === captainId);
      if (price > captain.wallet) { msg.textContent = `${captain.name} only has ${captain.wallet} pts left.`; return; }
      await supabase.from('players').update({ captain_id: captainId, sold_price: price, is_sold: true }).eq('id', playerId);
      await supabase.from('captains').update({ wallet: captain.wallet - price }).eq('id', captainId);
      document.getElementById('consolePlayer').value = '';
      document.getElementById('consoleCaptain').value = '';
      document.getElementById('consolePrice').value = '';
      msg.textContent = 'Player assigned!';
      setTimeout(() => msg.textContent = '', 3000);
      loadData();
    }

    async function unassignPlayer(playerId, captainId, soldPrice) {
      if (!confirm('Unassign this player and refund the points?')) return;
      const captain = allCaptains.find(c => c.id === captainId);
      await supabase.from('players').update({ captain_id: null, sold_price: null, is_sold: false }).eq('id', playerId);
      await supabase.from('captains').update({ wallet: captain.wallet + soldPrice }).eq('id', captainId);
      loadData();
    }

    supabase.channel('bpl-admin')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'captains' }, loadData)
      .on('postgres_changes', { event: '*', schema: 'public', table: 'players' }, loadData)
      .subscribe();

    loadData();
  </script>
</body>
</html>
