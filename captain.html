<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BPL Dallas – Captain</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="nav">
    <span class="nav-brand" style="font-size:1.1rem;letter-spacing:0.06em;">Brownish Premier League</span>
    <div class="nav-user">
      <span id="navName"></span>
      <button class="btn-logout" onclick="logout()">Sign out</button>
    </div>
  </nav>

  <div class="page">
    <!-- My Wallet -->
    <div class="wallet-hero" id="myWallet">
      <div class="wallet-label">My Purse</div>
      <div class="wallet-amount" id="myWalletAmount">—</div>
      <div class="wallet-name" id="myWalletName"></div>
    </div>

    <!-- My Team -->
    <div class="section-title">My Team</div>
    <div id="myTeamCard" class="captain-card" style="margin-bottom:24px;">
      <div class="team-roster" id="myRoster"></div>
    </div>

    <!-- All Captains -->
    <div class="section-title">All Captains</div>
    <div class="captains-grid" id="captainsGrid"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script>
    // Guard
    const user = JSON.parse(sessionStorage.getItem('bpl_user') || 'null');
    if (!user || sessionStorage.getItem('bpl_role') !== 'captain') window.location.href = 'index.html';

    document.getElementById('navName').textContent = user.name;

    function logout() {
      sessionStorage.clear();
      window.location.href = 'index.html';
    }

    function groupBadge(g) {
      return `<span class="group-badge group-${g}">Group ${g}</span>`;
    }

    function renderWallet(captain) {
      document.getElementById('myWalletAmount').textContent = captain.wallet.toLocaleString() + ' pts';
      document.getElementById('myWalletName').textContent = captain.name + ' · Group ' + captain.group_name;
    }

    function renderRoster(players, captainId, container) {
      const mine = players.filter(p => p.captain_id === captainId);
      if (mine.length === 0) {
        container.innerHTML = '<div class="roster-empty">No players yet</div>';
        return;
      }
      container.innerHTML = mine.map(p => `
        <div class="roster-player">
          <span class="roster-player-name">${p.name}</span>
          <span class="roster-player-price">${p.sold_price ? p.sold_price + ' pts' : ''}</span>
        </div>
      `).join('');
    }

    function renderCaptainsGrid(captains, players) {
      const grid = document.getElementById('captainsGrid');
      const others = captains.filter(c => c.id !== user.id);
      grid.innerHTML = others.map(c => {
        const roster = players.filter(p => p.captain_id === c.id);
        const rosterHtml = roster.length
          ? roster.map(p => `<div class="roster-player"><span class="roster-player-name">${p.name}</span><span class="roster-player-price">${p.sold_price ? p.sold_price + ' pts' : ''}</span></div>`).join('')
          : '<div class="roster-empty">No players yet</div>';
        return `
          <div class="captain-card">
            <div class="captain-card-header">
              <div>
                <div class="captain-name">${c.name}</div>
                <div class="captain-wallet-label">Purse</div>
                <div class="captain-wallet">${c.wallet.toLocaleString()} <span style="font-size:0.8rem;color:var(--muted)">pts</span></div>
              </div>
            </div>
            <div class="team-roster">${rosterHtml}</div>
          </div>
        `;
      }).join('');
    }

    async function loadData() {
      const [{ data: captains }, { data: players }] = await Promise.all([
        db.from('captains').select('*').order('name'),
        db.from('players').select('*').eq('is_sold', true)
      ]);

      const me = captains.find(c => c.id === user.id);
      if (me) renderWallet(me);
      renderRoster(players || [], user.id, document.getElementById('myRoster'));
      renderCaptainsGrid(captains || [], players || []);
    }

    loadData();

    // Realtime
    db.channel('bpl-realtime')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'captains' }, loadData)
      .on('postgres_changes', { event: '*', schema: 'public', table: 'players' }, loadData)
      .subscribe();
  </script>
</body>
</html>
